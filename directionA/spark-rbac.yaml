apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: spark-role

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - persistentvolumeclaims
  verbs:
    - create
    - get
    - list
    - watch
    - update
    - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: default

subjects:
- kind: ServiceAccount
  name: spark
  namespace: default

roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
