apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-spark
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/stu2558/douban-spark:v10
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work-dir/douban_spark.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: 1g
    serviceAccount: spark
  executor:
    cores: 1
    instances: 2
    memory: 1g
  deps: {}
  sparkConf:
"spark.kubernetes.container.image.pullPolicy": "Always"
